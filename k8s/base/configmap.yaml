apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
data:
  PORT: "5000"

  # PostgreSQL
  DB_HOST: "postgres"         # emri i Service-it të postgres brenda cluster-it
  DB_PORT: "5432"
  DB_USER: "postgres"
  DB_NAME: "app_db"

  # MongoDB
  MONGO_URI: "mongodb://mongo:27017/activityLog"

  # Redis
  REDIS_URL: "redis://redis:6379"

  # Kafka
  KAFKA_BROKER: "kafka:9092"
  KAFKA_CLIENT_ID: "backend-app"
  KAFKA_TOPIC_POSTS: "post-events"
  KAFKA_GROUP_ID: "post-events-group"
  KAFKAJS_NO_PARTITIONER_WARNING: "1"

  # CORS
  FRONTEND_ORIGIN: "http://localhost:3000"

  # JWT expiry (jo sekrete)
  JWT_ACCESS_EXPIRES_IN: "15m"
  JWT_REFRESH_EXPIRES_IN: "7d"

  # 2FA & Reset
  TWO_FA_EXPIRES_SECONDS: "300"
  RESET_PASSWORD_EXPIRES_SECONDS: "600"

  # Mail
  MAIL_HOST: "smtp.gmail.com"
  MAIL_PORT: "587"
